# Default configuration uses H2 for local development.
# Production can set DATABASE_URL=postgresql://user:pass@host:5432/db
# or Spring's normal SPRING_DATASOURCE_URL/USERNAME/PASSWORD variables.
spring.datasource.url=${SPRING_DATASOURCE_URL:jdbc:h2:mem:constructiondb}
spring.datasource.username=${SPRING_DATASOURCE_USERNAME:sa}
spring.datasource.password=${SPRING_DATASOURCE_PASSWORD:password}
spring.h2.console.enabled=${H2_CONSOLE_ENABLED:true}

# Hibernate ddl auto (create, create-drop, validate, update)
spring.jpa.hibernate.ddl-auto=update

# Security Configuration
spring.security.user.name=${APP_USERNAME:admin}
spring.security.user.password=${APP_PASSWORD:secret123}

server.port=${PORT:8080}
