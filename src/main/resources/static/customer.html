<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Customer Details | Gold Loan Accounts</title>
    <link href="https://fonts.googleapis.com/css2?family=Inter:wght@300;400;600;700&display=swap" rel="stylesheet">
    <link rel="stylesheet" href="css/styles.css">
</head>
<body>
    <div class="app-container">
        <header class="top-nav">
            <div class="logo">
                <a href="index.html" class="back-link">&larr; Back</a>
                <span class="logo-icon">GL</span>
                <h1>Gold Loan Accounts</h1>
            </div>
            <div class="header-actions">
                <button class="btn-secondary" onclick="openEditCustomerModal()">Edit</button>
                <button class="btn-danger" onclick="handleDeleteCustomer()">Delete</button>
                <button class="btn-success" onclick="openModal('addDepositModal')">Add Funds</button>
                <button class="btn-primary" onclick="openModal('addPurchaseModal')">Log Loan</button>
            </div>
        </header>

        <main class="main-content">
            <div class="profile-header card glass-panel">
                <div class="profile-info">
                    <h2 id="detailName">Loading...</h2>
                    <p id="detailPhone" class="text-muted"></p>
                    <p id="detailAddress" class="text-muted"></p>
                </div>
                <div class="balance-display">
                    <span class="balance-label">Current Balance</span>
                    <h1 id="detailBalance" class="balance-amount">INR 0.00</h1>
                </div>
            </div>

            <section class="transactions-section">
                <h3 class="section-title">Transaction History</h3>
                <div class="table-container glass-panel">
                    <table class="data-table">
                        <thead>
                            <tr>
                                <th>Date</th>
                                <th>Type</th>
                                <th>Description</th>
                                <th class="amount-col">Amount</th>
                            </tr>
                        </thead>
                        <tbody id="transactionsTableBody"></tbody>
                    </table>
                </div>
            </section>
        </main>
    </div>

    <div id="editCustomerModal" class="modal-overlay">
        <div class="modal-content">
            <div class="modal-header">
                <h2>Edit Customer</h2>
                <button class="close-btn" onclick="closeModal('editCustomerModal')" aria-label="Close">&times;</button>
            </div>
            <form id="editCustomerForm" onsubmit="handleEditCustomer(event)">
                <div class="form-group">
                    <label for="editCustomerName">Full Name</label>
                    <input type="text" id="editCustomerName" required>
                </div>
                <div class="form-group">
                    <label for="editCustomerPhone">Phone Number</label>
                    <input type="text" id="editCustomerPhone" required>
                </div>
                <div class="form-group">
                    <label for="editCustomerAddress">Address</label>
                    <input type="text" id="editCustomerAddress" required>
                </div>
                <div class="form-group">
                    <label for="editCustomerBalance">Current Balance (INR)</label>
                    <input type="number" step="0.01" id="editCustomerBalance" required>
                </div>
                <div class="modal-actions">
                    <button type="button" class="btn-secondary" onclick="closeModal('editCustomerModal')">Cancel</button>
                    <button type="submit" class="btn-primary">Save Changes</button>
                </div>
            </form>
        </div>
    </div>

    <div id="addDepositModal" class="modal-overlay">
        <div class="modal-content">
            <div class="modal-header">
                <h2>Add Funds</h2>
                <button class="close-btn" onclick="closeModal('addDepositModal')" aria-label="Close">&times;</button>
            </div>
            <form id="addDepositForm" onsubmit="handleAddTransaction(event, 'DEPOSIT')">
                <div class="form-group">
                    <label for="depositAmount">Amount (INR)</label>
                    <input type="number" step="0.01" min="0.01" id="depositAmount" required>
                </div>
                <div class="form-group">
                    <label for="depositDescription">Notes</label>
                    <input type="text" id="depositDescription" placeholder="e.g. Cash payment" required>
                </div>
                <div class="modal-actions">
                    <button type="button" class="btn-secondary" onclick="closeModal('addDepositModal')">Cancel</button>
                    <button type="submit" class="btn-success">Add Funds</button>
                </div>
            </form>
        </div>
    </div>

    <div id="addPurchaseModal" class="modal-overlay">
        <div class="modal-content">
            <div class="modal-header">
                <h2>Log Loan Amount</h2>
                <button class="close-btn" onclick="closeModal('addPurchaseModal')" aria-label="Close">&times;</button>
            </div>
            <form id="addPurchaseForm" onsubmit="handleAddTransaction(event, 'PURCHASE')">
                <div class="form-group">
                    <label for="purchaseAmount">Amount (INR)</label>
                    <input type="number" step="0.01" min="0.01" id="purchaseAmount" required>
                </div>
                <div class="form-group">
                    <label for="purchaseDescription">Description</label>
                    <input type="text" id="purchaseDescription" placeholder="e.g. Gold loan issued" required>
                </div>
                <div class="modal-actions">
                    <button type="button" class="btn-secondary" onclick="closeModal('addPurchaseModal')">Cancel</button>
                    <button type="submit" class="btn-primary">Deduct Amount</button>
                </div>
            </form>
        </div>
    </div>

    <script src="js/main.js"></script>
    <script>
        document.addEventListener('DOMContentLoaded', loadCustomerDetails);
    </script>
</body>
</html>
