<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Gold Loan Accounts Dashboard</title>
    <link href="https://fonts.googleapis.com/css2?family=Inter:wght@300;400;600;700&display=swap" rel="stylesheet">
    <link rel="stylesheet" href="css/styles.css">
</head>
<body>
    <div class="app-container">
        <header class="top-nav">
            <div class="logo">
                <span class="logo-icon">GL</span>
                <h1>Gold Loan Accounts</h1>
            </div>
            <button class="btn-primary" onclick="openModal('addCustomerModal')">+ New Customer</button>
        </header>

        <main class="main-content">
            <div class="stats-overview">
                <div class="stat-card">
                    <h3>Total Customers</h3>
                    <p id="totalCustomersStat" class="stat-value">0</p>
                </div>
                <div class="stat-card">
                    <h3>Total Balance</h3>
                    <p id="totalBalanceStat" class="stat-value">INR 0.00</p>
                </div>
            </div>

            <section class="customers-section">
                <h2 class="section-title">Active Customers</h2>
                <div class="customers-grid" id="customersGrid"></div>
            </section>
        </main>
    </div>

    <div id="addCustomerModal" class="modal-overlay">
        <div class="modal-content">
            <div class="modal-header">
                <h2>Add New Customer</h2>
                <button class="close-btn" onclick="closeModal('addCustomerModal')" aria-label="Close">&times;</button>
            </div>
            <form id="addCustomerForm" onsubmit="handleAddCustomer(event)">
                <div class="form-group">
                    <label for="customerName">Full Name</label>
                    <input type="text" id="customerName" required placeholder="e.g. Ravi Kumar">
                </div>
                <div class="form-group">
                    <label for="customerPhone">Phone Number</label>
                    <input type="text" id="customerPhone" required placeholder="e.g. +91 98765 43210">
                </div>
                <div class="form-group">
                    <label for="customerAddress">Address</label>
                    <input type="text" id="customerAddress" required placeholder="Customer address">
                </div>
                <div class="form-group">
                    <label for="customerBalance">Opening Balance (INR)</label>
                    <input type="number" step="0.01" id="customerBalance" value="0.00">
                </div>
                <div class="modal-actions">
                    <button type="button" class="btn-secondary" onclick="closeModal('addCustomerModal')">Cancel</button>
                    <button type="submit" class="btn-primary">Save Customer</button>
                </div>
            </form>
        </div>
    </div>

    <script src="js/main.js"></script>
    <script>
        document.addEventListener('DOMContentLoaded', loadCustomers);
    </script>
</body>
</html>
