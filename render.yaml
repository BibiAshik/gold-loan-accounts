services:
  - type: web
    name: gold-loan-accounts
    runtime: docker
    plan: free
    region: singapore
    healthCheckPath: /api/health
    envVars:
      - key: DATABASE_URL
        fromDatabase:
          name: gold-loan-db
          property: connectionString
      - key: APP_USERNAME
        value: admin
      - key: APP_PASSWORD
        generateValue: true
      - key: H2_CONSOLE_ENABLED
        value: false

databases:
  - name: gold-loan-db
    plan: free
    region: singapore
    databaseName: goldloandb
    postgresMajorVersion: "17"
